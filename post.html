<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artikel — ConnectGerman</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#00897B;--dark-teal:#00695C;--charcoal:#1C2526;--light:#F5F7F8;--white:#fff;--mid:#607D8B;--border:#CFD8DC;--yellow:#FFD600}
body{font-family:'Raleway',sans-serif;background:var(--light);color:var(--charcoal)}
header{background:var(--charcoal);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:0 28px;height:68px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:38px;height:38px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:24px;color:#fff;letter-spacing:2px}
.logo-text span{color:var(--yellow)}
nav a{text-decoration:none;color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;padding:8px 14px;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;margin-left:4px}
nav a:hover{color:#fff}
.post-hero{background:var(--charcoal);padding:64px 28px;color:#fff;position:relative;overflow:hidden}
.post-hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--teal),var(--yellow))}
.post-hero-inner{max-width:900px;margin:0 auto}
.post-cat{display:inline-flex;align-items:center;gap:8px;margin-bottom:20px}
.post-cat::before{content:'';width:24px;height:2px;background:var(--teal)}
.post-cat-text{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--teal);font-weight:700}
.post-title{font-family:'Bebas Neue',sans-serif;font-size:58px;line-height:0.95;letter-spacing:1px;margin-bottom:24px}
.post-meta{display:flex;gap:24px;flex-wrap:wrap;font-size:12px;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.5px}
.post-meta span{color:rgba(255,255,255,0.85)}
.layout{max-width:1100px;margin:44px auto;padding:0 28px;display:grid;grid-template-columns:1fr 260px;gap:28px}
.main-col{background:var(--white);padding:40px;border:1px solid var(--border)}
.back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--mid);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border);width:100%}
.back-btn::before{content:'←';color:var(--teal)}
.back-btn:hover{color:var(--teal)}
.article-body{font-size:17px;line-height:1.9;color:#37474F;font-weight:300}
.article-body p{margin-bottom:26px}
.article-body h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:var(--charcoal);margin:48px 0 16px;padding-left:16px;border-left:3px solid var(--teal)}
.article-body h3{font-size:18px;font-weight:700;color:var(--charcoal);margin:32px 0 10px}
.article-body a{color:var(--teal);font-weight:600;text-decoration:none;border-bottom:1px solid var(--teal)}
.article-body a:hover{color:var(--dark-teal)}
.article-body ul,.article-body ol{padding-left:24px;margin-bottom:22px}
.article-body li{margin-bottom:8px;line-height:1.7}
blockquote{background:var(--light);border-left:4px solid var(--yellow);padding:22px 28px;margin:32px 0;font-size:19px;font-style:italic;color:var(--mid)}
.sidebar{display:flex;flex-direction:column;gap:16px}
.widget{background:var(--white);border:1px solid var(--border);padding:22px}
.widget-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--charcoal);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--teal)}
.recent-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.recent-item:last-child{border-bottom:none}
.recent-item a{color:var(--charcoal);text-decoration:none;font-weight:600;display:block;margin-bottom:3px;line-height:1.4}
.recent-item a:hover{color:var(--teal)}
.recent-item span{font-size:11px;color:#aaa}
.not-found{text-align:center;padding:80px;color:var(--mid);grid-column:1/-1}
.not-found h2{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--charcoal);margin-bottom:12px}
footer{background:var(--charcoal);color:rgba(255,255,255,0.4);text-align:center;padding:28px;font-size:12px;margin-top:60px}
footer a{color:rgba(255,255,255,0.4);text-decoration:none;margin:0 8px}
footer a:hover{color:var(--teal)}
.fl{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:2px;margin-bottom:8px}
.fl span{color:var(--yellow)}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-icon">CG</div><div class="logo-text">Connect<span>German</span></div></a>
    <nav><a href="index.html">← Zurück</a><a href="index.html">Home</a></nav>
  </div>
</header>
<div id="post-hero" class="post-hero" style="display:none">
  <div class="post-hero-inner">
    <div class="post-cat"><span class="post-cat-text" id="post-cat">Deutschland</span></div>
    <div class="post-title" id="post-title"></div>
    <div class="post-meta">
      <span>VON <span id="post-author">Redaktion</span></span>
      <span>📅 <span id="post-date"></span></span>
      <span>⏱ <span id="post-read">5 Min.</span></span>
    </div>
  </div>
</div>
<div class="layout">
  <div class="main-col">
    <a href="index.html" class="back-btn">Alle Artikel</a>
    <div id="article-body" class="article-body"></div>
    <div id="not-found" class="not-found" style="display:none"><h2>Nicht gefunden</h2><p>Artikel existiert nicht.</p></div>
  </div>
  <aside class="sidebar">
    <div class="widget"><div class="widget-title">Aktuelle Artikel</div><div id="recent-posts"></div></div>
    <div class="widget"><div class="widget-title">Über uns</div><p style="font-size:13px;line-height:1.7;color:#666;font-weight:300">ConnectGerman verbindet Menschen mit aktuellen Informationen aus Deutschland.</p></div>
  </aside>
</div>
<footer><div class="fl">Connect<span>German</span></div><p>&copy; 2026 ConnectGerman &nbsp;|&nbsp;<a href="#">Impressum</a>&nbsp;|&nbsp;<a href="#">Datenschutz</a></p></footer>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const SITE_NAME = 'connectgerman';
const GIST_ID = '42ea11087f40fdba423f8eb0f575ac96'; // Same Gist for all sites!

async function loadPost() {
  try {
    console.log('Fetching post from Gist ID:', GIST_ID);
    console.log('Looking for post ID:', id);
    
    // Use raw URL
    const rawUrl = `https://gist.githubusercontent.com/Hamzamain-spec/${GIST_ID}/raw/posts.json`;
    const response = await fetch(rawUrl);
    
    if (response.ok) {
      const allPosts = await response.json();
      console.log('All posts:', allPosts);
      
      // Filter by site name
      const sitePosts = allPosts.filter(post => post.site === SITE_NAME);
      console.log(`Found ${sitePosts.length} posts for site: ${SITE_NAME}`);
      
      const post = sitePosts.find(p => p.id == id);
      console.log('Found post:', post);
      
      if (post) {
        document.title = post.title + ' — ConnectGerman';
        document.getElementById('post-title').textContent = post.title;
        document.getElementById('post-cat').textContent = post.category || 'Deutschland';
        document.getElementById('post-author').textContent = post.author || 'Redaktion';
        document.getElementById('post-date').textContent = new Date(post.date).toLocaleDateString('de-DE', {
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });
        
        const words = post.content.replace(/<[^>]+>/g, '').split(' ').length;
        document.getElementById('post-read').textContent = Math.max(1, Math.round(words / 200)) + ' Min. Lesezeit';
        
        document.getElementById('article-body').innerHTML = post.content;
        document.getElementById('post-hero').style.display = 'block';
        
        // Recent posts
        const rp = document.getElementById('recent-posts');
        rp.innerHTML = '';
        sitePosts.slice(-4).reverse().forEach(p => {
          if (p.id == id) return;
          rp.innerHTML += `<div class="recent-item"><a href="post.html?id=${p.id}">${p.title}</a><span>${new Date(p.date).toLocaleDateString('de-DE')}</span></div>`;
        });
      } else {
        console.log('Post not found for ID:', id);
        document.getElementById('not-found').style.display = 'block';
      }
    } else {
      console.error('Failed to fetch from Gist:', response.status);
      document.getElementById('not-found').style.display = 'block';
    }
  } catch (error) {
    console.error('Error loading post:', error);
    document.getElementById('not-found').style.display = 'block';
  }
}

loadPost();
</script>
</body>
</html>
